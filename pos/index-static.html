    <!-- Simple numpad functionality -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userInput = document.getElementById('user_input');
            const passwordInput = document.getElementById('password_input');
            let activeInput = userInput;

            // Focus handling
            userInput.addEventListener('focus', () => activeInput = userInput);
            passwordInput.addEventListener('focus', () => activeInput = passwordInput);

            // Numpad click handlers
            document.querySelectorAll('.logInPadEl').forEach(el => {
                el.addEventListener('click', function() {
                    const id = this.id;
                    if (id.startsWith('logInPadNu') && id.endsWith('Nu')) return;

                    if (id === 'logInPadDel' || id === 'logInPadDelArr') {
                        activeInput.value = activeInput.value.slice(0, -1);
                    } else if (id.startsWith('logInPadNu')) {
                        const num = id.replace('logInPadNu', '');
                        if (activeInput.value.length < 15) {
                            activeInput.value += num;
                        }
                    }
                });
            });

            // Clear buttons
            document.getElementById('userInputClear').addEventListener('click', () => {
                userInput.value = '';
                userInput.focus();
            });
            document.getElementById('passwordInputClear').addEventListener('click', () => {
                passwordInput.value = '';
                passwordInput.focus();
            });

            // Login button - redirect to dashboard
            document.getElementById('loginButton').addEventListener('click', () => {
                if (userInput.value && passwordInput.value) {
                    window.location.href = 'dashboard-static.html';
                } else {
                    alert('Por favor ingrese ID de operador y contraseña');
                }
            });
        });
    </script>
