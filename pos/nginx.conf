server {
    listen 4069 ssl;
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    root /usr/share/nginx/html;
    index index.html;

    # WSS proxy for relay server (wss://host:4069/relay → ws://relay-server:4081)
    location /relay {
        proxy_pass http://relay-server:4081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # WSS proxy for Virteon ws-server (wss://host:4069/pos-relay → ws://virteon-ws-server:4097/pos-relay)
    location /pos-relay {
        proxy_pass http://virteon-ws-server:4097/pos-relay;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # WSS proxy for DS real data (wss://host:4069/pos-relay-ds → ws://host:4201/pos-relay)
    location /pos-relay-ds {
        proxy_pass http://host.docker.internal:4201/pos-relay;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
