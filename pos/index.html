<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#03163d">
    <meta name="msapplication-TileColor" content="#03163d">
    <meta name="msapplication-navbutton-color" content="#03163d">
    <meta name="apple-mobile-web-app-status-bar-style" content="#03163d">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="msapplication-tap-highlight" content="no">
    <!-- Google Fonts: Barlow Condensed + Open Sans — used by the 'web' skin
         (corporate look matching web-lobby). The classic skin uses DIN. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Fredoka:wght@500;600;700&family=Open+Sans:wght@400;600;700&display=swap">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%2303163d' width='32' height='32'/></svg>">
    <title>Virtual Racing POS</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #03163d;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .dots {
        display: flex;
        gap: 8px;
      }
      .dot {
        width: 12px;
        height: 12px;
        background: rgba(255,255,255,0.9);
        border-radius: 50%;
        animation: bounce 1.4s ease-in-out infinite;
      }
      .dot:nth-child(1) { animation-delay: 0s; }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes bounce {
        0%, 80%, 100% {
          transform: scale(0.6);
          opacity: 0.4;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash">
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
