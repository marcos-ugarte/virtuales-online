<!DOCTYPE html>
<html lang="en">
  <head>
    <script>window.localStorage.setItem('debug', 'mediasoup-client:WARN* mediasoup-client:ERROR*');</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Video</title>
    <style>
      #errBack {
        width: 100%; height: 100%;
        position: absolute; z-index: 10;
        background-color: rgb(0,0,0,0.5);
        top: 0px; left: 0px;
      }
      .errDial {
        color: #ffffff; width: 400px;
        margin: 200px auto 0px auto; min-height: 150px;
        font-family: Arial, sans-serif; position: relative;
        background-color: rgb(220,220,220);
      }
      #errHead {
        width: 100%; height: 34px; font-size: 20px;
        color: #FFFFFF; line-height: 34px; text-align: center;
        font-weight: bold; background-color: rgb(70,70,70);
      }
      #errMsg { padding: 15px; font-size: 17px; color: #000000; }
      #errButt {
        position: absolute; bottom: 20px; right: 20px;
        font-size: 15px; line-height: 15px; padding: 10px;
        z-index: 1; border-radius: 5px; font-weight: bold;
        cursor: pointer; background: rgb(130,130,130); color: #ffffff;
      }
      #startInfo {
        width: 100%; height: 100%;
        position: absolute; z-index: 10;
        background-color: #EEEEEE; top: 0px; left: 0px; text-align: center;
      }
      .centerBo {
        position: absolute; top: 50%; left: 50%;
        transform: translateX(-50%) translateY(-50%);
      }
      #startInfoMsg > b { font-size: 22px; }
    </style>
    <link rel="icon" href="./favicon.ico" />
  </head>
  <body>
    <div id="root"></div>
    <div id="errBack" style="display: none;">
      <div class="errDial">
        <div id="errHead"></div>
        <div id="errMsg"></div>
        <div id="errButt">OK</div>
      </div>
    </div>
    <div id="startInfo" style="display: none;">
      <div id="startInfoMsg" class="centerBo">TEST</div>
    </div>
  </body>
</html>
